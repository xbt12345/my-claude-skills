{
  "$schema": "https://json-schema.org/draft/2020-12/schema",
  "title": "Goal Contract",
  "type": "object",
  "required": [
    "surface_request",
    "real_outcome",
    "audience",
    "deliverable",
    "success_evidence",
    "assumptions"
  ],
  "properties": {
    "surface_request": {"type": "string", "minLength": 1},
    "real_outcome": {"type": "string", "minLength": 1},
    "audience": {"type": "string", "minLength": 1},
    "decision_or_action": {"type": "string"},
    "deliverable": {"type": "string", "minLength": 1},
    "available_inputs": {"type": "array", "items": {"type": "string"}},
    "constraints": {"type": "array", "items": {"type": "string"}},
    "non_goals": {"type": "array", "items": {"type": "string"}},
    "success_evidence": {"type": "array", "minItems": 1, "items": {"type": "string"}},
    "critical_unknowns": {"type": "array", "items": {"type": "string"}},
    "assumptions": {"type": "array", "items": {"type": "string"}}
  },
  "additionalProperties": false
}
