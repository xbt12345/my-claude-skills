{
  "$schema": "https://json-schema.org/draft/2020-12/schema",
  "title": "Meta-Prompt Eval Case",
  "type": "object",
  "required": [
    "id",
    "category",
    "input",
    "expected_mode",
    "needs_taste",
    "assertions"
  ],
  "properties": {
    "id": {"type": "string", "minLength": 1},
    "category": {
      "enum": [
        "express",
        "ambiguity",
        "taste",
        "risk",
        "prompt-bloat",
        "goal-misalignment"
      ]
    },
    "input": {"type": "string", "minLength": 1},
    "expected_mode": {"enum": ["Express", "Guided", "Harness"]},
    "needs_taste": {"type": "boolean"},
    "assertions": {"type": "array", "minItems": 1, "items": {"type": "string"}},
    "priority": {"enum": ["P0", "P1", "P2"]}
  },
  "additionalProperties": false
}
